<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muloo Deploy OS Module Detail</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body data-page="module-detail">
    <div class="shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Muloo Internal</p>
          <h1>Deploy OS</h1>
          <p class="sidebar-copy">
            Contract, readiness, and execution detail for a single project
            module.
          </p>
        </div>
        <nav class="nav">
          <a class="nav-link" href="/">Dashboard</a>
          <a class="nav-link active" href="/projects">Projects</a>
          <a class="nav-link" href="/modules">Modules</a>
          <a class="nav-link" href="/settings">Settings</a>
        </nav>
      </aside>
      <main class="content">
        <section class="hero compact" id="module-detail-hero">
          <div>
            <p class="eyebrow">Module detail</p>
            <h2>Loading module...</h2>
          </div>
        </section>
        <section class="grid two-col">
          <article class="panel">
            <p class="panel-label">Contract</p>
            <div id="module-detail-contract"></div>
          </article>
          <article class="panel">
            <p class="panel-label">Readiness</p>
            <div id="module-detail-readiness"></div>
          </article>
        </section>
        <section class="grid two-col">
          <article class="panel">
            <p class="panel-label">Inputs</p>
            <div id="module-detail-inputs"></div>
          </article>
          <article class="panel">
            <p class="panel-label">Execution summary</p>
            <div id="module-detail-execution"></div>
          </article>
        </section>
      </main>
    </div>
    <script src="/assets/app.js"></script>
  </body>
</html>
