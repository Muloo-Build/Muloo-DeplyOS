<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muloo Deploy Setup Area Detail</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body data-page="module-detail">
    <div class="shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Muloo Internal</p>
          <h1>Muloo Deploy</h1>
          <p class="sidebar-copy">
            Setup area detail for readiness, safe run rules, and latest run
            context.
          </p>
        </div>
        <nav class="nav">
          <a class="nav-link" href="/">Home</a>
          <a class="nav-link" href="/projects">Projects</a>
          <a class="nav-link" href="/templates">Templates</a>
          <a class="nav-link" href="/runs">Runs</a>
          <a class="nav-link" href="/guide">Guide</a>
          <a class="nav-link" href="/settings">Settings</a>
        </nav>
      </aside>
      <main class="content">
        <section class="workspace-header compact" id="module-detail-hero">
          <div>
            <p class="eyebrow">Setup area detail</p>
            <h2>Loading setup area...</h2>
          </div>
        </section>
        <section class="grid two-col">
          <article class="panel">
            <p class="panel-label">Run contract</p>
            <div id="module-detail-contract"></div>
          </article>
          <article class="panel">
            <p class="panel-label">Review status</p>
            <div id="module-detail-readiness"></div>
          </article>
        </section>
        <section class="grid two-col">
          <article class="panel">
            <p class="panel-label">Required inputs</p>
            <div id="module-detail-inputs"></div>
          </article>
          <article class="panel">
            <p class="panel-label">Latest run</p>
            <div id="module-detail-execution"></div>
          </article>
        </section>
      </main>
    </div>
    <script src="/assets/app.js"></script>
  </body>
</html>
