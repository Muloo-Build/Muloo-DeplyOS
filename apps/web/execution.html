<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muloo Deploy OS Execution Detail</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body data-page="execution-detail">
    <div class="shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Muloo Internal</p>
          <h1>Deploy OS</h1>
          <p class="sidebar-copy">
            Step-by-step execution timeline for project dry runs.
          </p>
        </div>
        <nav class="nav">
          <a class="nav-link" href="/">Dashboard</a>
          <a class="nav-link active" href="/projects">Projects</a>
          <a class="nav-link" href="/modules">Modules</a>
          <a class="nav-link" href="/settings">Settings</a>
        </nav>
      </aside>
      <main class="content">
        <section class="hero compact" id="execution-detail-hero">
          <div>
            <p class="eyebrow">Execution detail</p>
            <h2>Loading execution...</h2>
          </div>
        </section>
        <section class="panel">
          <p class="panel-label">Summary</p>
          <div id="execution-detail-summary"></div>
        </section>
        <section class="panel">
          <div class="section-header">
            <div>
              <p class="panel-label">Timeline</p>
              <h3>Execution steps</h3>
            </div>
          </div>
          <div class="timeline" id="execution-detail-timeline"></div>
        </section>
      </main>
    </div>
    <script src="/assets/app.js"></script>
  </body>
</html>
