<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muloo Deploy Run Detail</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body data-page="execution-detail">
    <div class="shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Muloo Internal</p>
          <h1>Muloo Deploy</h1>
          <p class="sidebar-copy">
            Step-by-step run detail for dry runs and safe apply actions.
          </p>
        </div>
        <nav class="nav">
          <a class="nav-link" href="/">Home</a>
          <a class="nav-link" href="/projects">Projects</a>
          <a class="nav-link" href="/templates">Templates</a>
          <a class="nav-link active" href="/runs">Runs</a>
          <a class="nav-link" href="/guide">Guide</a>
          <a class="nav-link" href="/settings">Settings</a>
        </nav>
      </aside>
      <main class="content">
        <section class="workspace-header compact" id="execution-detail-hero">
          <div>
            <p class="eyebrow">Run detail</p>
            <h2>Loading run...</h2>
          </div>
        </section>
        <section class="panel">
          <p class="panel-label">Run summary</p>
          <div id="execution-detail-summary"></div>
        </section>
        <section class="panel">
          <p class="panel-label">Requested and completed actions</p>
          <div id="execution-detail-operations"></div>
        </section>
        <section class="panel">
          <div class="section-header">
            <div>
              <p class="panel-label">Run timeline</p>
              <h3>What happened step by step</h3>
            </div>
          </div>
          <div class="timeline" id="execution-detail-timeline"></div>
        </section>
      </main>
    </div>
    <script src="/assets/app.js"></script>
  </body>
</html>
