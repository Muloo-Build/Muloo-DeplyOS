<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muloo Deploy OS Lifecycle Design</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body data-page="project-design-lifecycle">
    <div class="shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Muloo Internal</p>
          <h1>Deploy OS</h1>
          <p class="sidebar-copy">
            Edit lifecycle stages and lead statuses for a project blueprint.
          </p>
        </div>
        <nav class="nav">
          <a class="nav-link" href="/">Dashboard</a>
          <a class="nav-link active" href="/projects">Projects</a>
          <a class="nav-link" href="/projects/new">Create Project</a>
          <a class="nav-link" href="/modules">Modules</a>
          <a class="nav-link" href="/settings">Settings</a>
        </nav>
      </aside>
      <main class="content">
        <section class="hero compact" id="project-design-lifecycle-hero">
          <div>
            <p class="eyebrow">Design editor</p>
            <h2>Loading lifecycle design...</h2>
          </div>
        </section>
        <section class="panel">
          <div id="project-workflow-nav"></div>
        </section>
        <section class="grid two-col">
          <article class="panel">
            <div class="section-header">
              <div>
                <p class="panel-label">Lifecycle stages</p>
                <h3>Ordered buying journey states</h3>
              </div>
            </div>
            <form id="project-design-lifecycle-form"></form>
          </article>
          <article class="panel">
            <div class="section-header">
              <div>
                <p class="panel-label">Lead statuses</p>
                <h3>Ordered lead handling states</h3>
              </div>
            </div>
            <div id="project-design-lifecycle-status"></div>
          </article>
        </section>
      </main>
    </div>
    <script src="/assets/app.js"></script>
  </body>
</html>
