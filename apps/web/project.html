<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muloo Deploy OS Project Detail</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body data-page="project-detail">
    <div class="shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Muloo Internal</p>
          <h1>Deploy OS</h1>
          <p class="sidebar-copy">
            Project-level read view for modules, scope, and execution readiness.
          </p>
        </div>
        <nav class="nav">
          <a class="nav-link" href="/">Dashboard</a>
          <a class="nav-link active" href="/projects">Projects</a>
          <a class="nav-link" href="/modules">Modules</a>
          <a class="nav-link" href="/settings">Settings</a>
        </nav>
      </aside>
      <main class="content">
        <section class="hero compact" id="project-detail-hero">
          <div>
            <p class="eyebrow">Project detail</p>
            <h2>Loading project...</h2>
          </div>
        </section>
        <section class="grid two-col">
          <article class="panel">
            <p class="panel-label">Summary</p>
            <div id="project-detail-summary"></div>
          </article>
          <article class="panel">
            <p class="panel-label">Execution context</p>
            <div id="project-detail-execution"></div>
          </article>
        </section>
        <section class="panel">
          <div class="section-header">
            <div>
              <p class="panel-label">Project modules</p>
              <h3>Module status and dependencies</h3>
            </div>
          </div>
          <div class="module-grid" id="project-detail-modules"></div>
        </section>
      </main>
    </div>
    <script src="/assets/app.js"></script>
  </body>
</html>
