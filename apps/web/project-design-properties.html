<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muloo Deploy Blueprint Properties</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body data-page="project-design-properties">
    <div class="shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">Muloo Internal</p>
          <h1>Muloo Deploy</h1>
          <p class="sidebar-copy">
            Blueprint editor for property groups and field design.
          </p>
        </div>
        <nav class="nav">
          <a class="nav-link" href="/">Home</a>
          <a class="nav-link" href="/projects">Projects</a>
          <a class="nav-link" href="/templates">Templates</a>
          <a class="nav-link" href="/runs">Runs</a>
          <a class="nav-link" href="/guide">Guide</a>
          <a class="nav-link" href="/settings">Settings</a>
        </nav>
      </aside>
      <main class="content">
        <section
          class="workspace-header compact"
          id="project-design-properties-hero"

          <div>
            <p class="eyebrow">Blueprint</p>
            <h2>Loading property blueprint...</h2>

          <div id="project-workflow-nav"></div>

              <div>

            </div>

          </article>
          <article class="panel">
            <div class="section-header">
              <div>
                <p class="panel-label">Review impact</p>

              </div>
            </div>
